<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#080d1a"/>
  <!-- Soccer ball base (white circle) -->
  <circle cx="32" cy="32" r="22" fill="#f9fbff"/>
  <!-- Center pentagon (orange) -->
  <polygon points="32,14 40,20 37,30 27,30 24,20" fill="#ff8900"/>
  <!-- Side pentagons (blue) -->
  <polygon points="40,20 50,22 52,32 44,38 37,30" fill="#0080ff"/>
  <polygon points="24,20 27,30 20,38 12,32 14,22" fill="#0080ff"/>
  <!-- Bottom pentagons (orange) -->
  <polygon points="44,38 46,48 32,52 18,48 20,38 27,30 37,30" fill="#ff8900" opacity="0.85"/>
  <!-- Seam lines -->
  <line x1="32" y1="10" x2="32" y2="14" stroke="#080d1a" stroke-width="1.5"/>
  <line x1="40" y1="20" x2="50" y2="22" stroke="#080d1a" stroke-width="1.2"/>
  <line x1="24" y1="20" x2="14" y2="22" stroke="#080d1a" stroke-width="1.2"/>
  <line x1="44" y1="38" x2="46" y2="48" stroke="#080d1a" stroke-width="1.2"/>
  <line x1="20" y1="38" x2="18" y2="48" stroke="#080d1a" stroke-width="1.2"/>
  <line x1="37" y1="30" x2="44" y2="38" stroke="#080d1a" stroke-width="1.2"/>
  <line x1="27" y1="30" x2="20" y2="38" stroke="#080d1a" stroke-width="1.2"/>
</svg>
